name: Build Android APK

# Builds the debug .apk entirely on GitHub's servers — no Android Studio,
# no local install needed. Run it manually from the Actions tab, or it
# runs automatically whenever the android/ folder changes.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'seedance-workspace/android/**'
      - 'seedance-workspace/capacitor.config.ts'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: seedance-workspace

      - name: Regenerate Capacitor native files
        run: npx cap sync android
        working-directory: seedance-workspace

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew
        working-directory: seedance-workspace/android

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: seedance-workspace/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: seedance-workspace-debug-apk
          path: seedance-workspace/android/app/build/outputs/apk/debug/app-debug.apk
